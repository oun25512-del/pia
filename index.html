<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คำนวณค่าไฟฟ้า + AI แนะนำประหยัดพลังงาน</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <div class="header">
    <h1>คำนวณค่าไฟฟ้า</h1>
    <p>ใส่อุปกรณ์ไฟฟ้าในบ้าน แล้วให้ AI แนะนำวิธีประหยัดพลังงาน</p>
  </div>

  <!-- การตั้งค่า -->
  <div class="card">
    <div class="section-label">เลือกประเภทผู้ใช้ &amp; ภูมิภาค</div>
    <div class="region-row">
      <label>การไฟฟ้า</label>
      <select id="region">
        <option value="mea">MEA (กรุงเทพ นนทบุรี สมุทรปราการ)</option>
        <option value="pea" selected>PEA (ต่างจังหวัด)</option>
      </select>
      <label>วันต่อเดือน</label>
      <input type="number" id="days" value="30" min="28" max="31" style="width:64px;text-align:center" />
    </div>

    <div class="section-label">เพิ่มด่วน</div>
    <div class="preset-grid" id="presets"></div>

    <div class="col-headers">
      <div class="col-label">อุปกรณ์</div>
      <div class="col-label center">วัตต์ (W)</div>
      <div class="col-label center">ชม./วัน</div>
      <div class="col-label center">จำนวน</div>
      <div></div>
    </div>
    <div id="appliance-list"></div>
    <button class="add-btn" onclick="addRow()">+ เพิ่มอุปกรณ์</button>
  </div>

  <!-- ผลลัพธ์ -->
  <div class="card">
    <div class="section-label">ผลการคำนวณ</div>
    <div class="summary-grid">
      <div class="metric">
        <div class="metric-label">หน่วยรวม</div>
        <div class="metric-value" id="total-units">0</div>
        <div class="metric-unit">kWh/เดือน</div>
      </div>
      <div class="metric">
        <div class="metric-label">ค่าไฟฟ้า</div>
        <div class="metric-value" id="total-baht">0</div>
        <div class="metric-unit">บาท/เดือน</div>
      </div>
      <div class="metric">
        <div class="metric-label">ต่อวัน</div>
        <div class="metric-value" id="per-day">0</div>
        <div class="metric-unit">บาท/วัน</div>
      </div>
    </div>

    <div class="section-label">รายละเอียดค่าไฟ</div>
    <div id="rate-breakdown"></div>
    <div id="bar-section" class="bar-wrap"></div>

    <button class="ai-btn" id="ai-btn" onclick="askAI()">
      ✦ ขอคำแนะนำประหยัดพลังงานจาก AI
    </button>
    <div id="ai-output" class="ai-result" style="display:none"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
